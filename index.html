<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de RH — Paccola & Pelegrini</title>
<style>
  :root{
    --bg:#fbfbfd; --panel:#ffffff; --panel2:#f4f5f7; --line:#ecedf1;
    --txt:#111827; --muted:#6b7280; --muted2:#9ca3af;
    --accent:#4f46e5; --accent2:#6366f1; --accent-soft:#eef2ff;
    --com:#d97706; --ope:#059669; --adm:#2563eb;
    --ok:#059669; --warn:#d97706; --bad:#dc2626;
    --chip:#f4f5f7;
    --shadow:0 1px 2px rgba(17,24,39,.04),0 1px 3px rgba(17,24,39,.06);
    --shadow-h:0 8px 24px rgba(17,24,39,.08);
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  #app{display:flex;min-height:100vh}
  /* Sidebar */
  aside{width:238px;flex:0 0 238px;background:var(--panel);border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{font-weight:700;font-size:15px;letter-spacing:-.2px;padding:6px 10px 18px;color:var(--txt)}
  .brand small{display:block;color:var(--muted2);font-weight:500;font-size:11px;margin-top:4px;letter-spacing:.3px}
  nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;margin-bottom:3px;transition:background .12s,color .12s}
  nav button:hover{background:var(--panel2);color:var(--txt)}
  nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  nav button .ic{width:20px;text-align:center;font-size:15px;opacity:.9}
  .lockbar{margin-top:16px;padding:12px 6px 4px;border-top:1px solid var(--line)}
  .lockbar button{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:9px;border-radius:10px;cursor:pointer;font-size:12.5px;transition:border-color .12s,background .12s}
  .lockbar button:hover{border-color:var(--accent);background:var(--accent-soft)}
  .lockstate{font-size:11px;color:var(--muted2);margin-top:7px;text-align:center}
  /* Main */
  main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(251,251,253,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center}
  .topbar h1{font-size:17px;font-weight:700;margin:0;margin-right:auto;letter-spacing:-.3px}
  .filter{display:flex;flex-direction:column;gap:4px}
  .filter label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);font-weight:600}
  select{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-size:13px;min-width:124px;cursor:pointer;transition:border-color .12s}
  select:hover{border-color:#d7d9e0}
  select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .content{padding:26px;max-width:1200px}
  h2.section{font-size:20px;font-weight:700;margin:0 0 4px;letter-spacing:-.4px}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:20px;max-width:900px;line-height:1.5}
  /* cards */
  .grid{display:grid;gap:16px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);transition:box-shadow .15s}
  .card:hover{box-shadow:var(--shadow-h)}
  .card h3{margin:0 0 12px;font-size:11.5px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .kpi{font-size:32px;font-weight:700;letter-spacing:-1px}
  .kpi small{font-size:13px;color:var(--muted);font-weight:500;letter-spacing:0}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
  .pill.com{background:rgba(217,119,6,.1);color:#b45309}
  .pill.ope{background:rgba(5,150,105,.1);color:#047857}
  .pill.adm{background:rgba(37,99,235,.1);color:#1d4ed8}
  .pill.ok{background:rgba(5,150,105,.1);color:#047857}
  .pill.warn{background:rgba(217,119,6,.1);color:#b45309}
  .pill.bad{background:rgba(220,38,38,.1);color:#b91c1c}
  .pill.exp{background:rgba(99,102,241,.1);color:#4f46e5}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--muted2);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;background:var(--panel)}
  tbody tr:last-child td{border-bottom:0}
  tr:hover td{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .cell-ok{color:var(--ok);font-weight:700}
  .cell-bad{color:var(--bad);font-weight:700}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%}
  .muted{color:var(--muted)}
  .tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:11px;color:var(--muted);margin:2px 4px 2px 0}
  .alert{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border-radius:12px;margin-bottom:9px;border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow)}
  .alert .ic{font-size:16px;margin-top:1px}
  .alert.warn{border-left:3px solid var(--warn)}
  .alert.bad{border-left:3px solid var(--bad)}
  .alert.exp{border-left:3px solid var(--accent)}
  .alert b{color:var(--txt)}
  .locked-note{color:var(--muted);font-style:italic;font-size:12px}
  .mask{letter-spacing:2px;color:var(--muted2)}
  .banner{background:var(--accent-soft);border:1px solid rgba(99,102,241,.22);border-radius:14px;padding:13px 15px;margin-bottom:18px;font-size:13px;color:#3730a3;line-height:1.5}
  .banner b{color:#312e81}
  .fichacard{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .15s}
  .fichacard:hover{box-shadow:var(--shadow-h)}
  .fichahead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px}
  .avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex:0 0 44px}
  .fichabody{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
  .kv{font-size:12.5px}
  .kv .k{color:var(--muted2);text-transform:uppercase;font-size:10px;letter-spacing:.4px;font-weight:600;margin-bottom:2px}
  .kv .v{color:var(--txt);font-size:13.5px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:6px 0 14px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .matrix td.yes{color:var(--ok);text-align:center;font-weight:700}
  .matrix td.no{color:var(--bad);text-align:center;background:rgba(220,38,38,.05);font-weight:700}
  .matrix td.na{color:var(--muted2);text-align:center}
  .scroll{overflow:auto}
  .foot{color:var(--muted2);font-size:11px;padding:20px 26px;border-top:1px solid var(--line);margin-top:24px;line-height:1.5}
  .barrow{display:grid;grid-template-columns:130px 1fr 60px;align-items:center;gap:11px;margin:9px 0;font-size:12.5px}
  .bartrack{background:var(--panel2);border-radius:8px;height:18px;overflow:hidden}
  .barfill{height:100%;border-radius:8px;transition:width .3s}
  .switchbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .12s}
  .switchbtn:hover{border-color:#d7d9e0}
  .switchbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .overlay{position:fixed;inset:0;background:rgba(17,24,39,.4);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;width:330px;box-shadow:0 20px 50px rgba(17,24,39,.2)}
  .modal h3{margin:0 0 12px}
  .modal input{width:100%;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-size:14px}
  .modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .modal .row{display:flex;gap:8px;margin-top:14px}
  .modal button{flex:1;padding:10px;border-radius:9px;border:0;cursor:pointer;font-weight:600}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .err{color:var(--bad);font-size:12px;margin-top:8px;min-height:14px}
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="brand">Paccola &amp; Pelegrini<small>Dashboard de RH · 2026</small></div>
    <nav id="nav"></nav>
    <div class="lockbar">
      <button id="lockBtn">Dados restritos</button>
      <div class="lockstate" id="lockState">bloqueado</div>
    </div>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="pageTitle">Visão geral</h1>
      <div class="filter"><label>Time</label><select id="fTime"></select></div>
      <div class="filter"><label>Cargo</label><select id="fCargo"></select></div>
      <div class="filter"><label>Mês</label><select id="fMes"></select></div>
      <div class="filter"><label>Pessoa</label><select id="fPessoa"></select></div>
    </div>
    <div class="content" id="content"></div>
    <div class="foot" id="foot"></div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Dados restritos (LGPD)</h3>
    <p class="muted" style="font-size:12.5px;margin:0 0 10px">A remuneração é visível apenas para a gestão. Digite a senha.</p>
    <input type="password" id="pwd" placeholder="senha" autocomplete="off">
    <div class="err" id="pwdErr"></div>
    <div class="row">
      <button class="btn-ghost" id="cancelPwd">Cancelar</button>
      <button class="btn-primary" id="okPwd">Desbloquear</button>
    </div>
  </div>
</div>

<div id="loginScreen" style="position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:100;padding:20px">
  <div class="modal" style="width:340px;text-align:center">
    <div style="font-weight:700;font-size:16px">Paccola &amp; Pelegrini</div>
    <div class="muted" style="font-size:12px;margin-bottom:16px">Dashboard de RH · acesso restrito</div>
    <input id="loginCode" type="password" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="código" style="text-align:center;letter-spacing:10px;font-size:22px;padding:12px">
    <div class="err" id="loginErr"></div>
    <button class="btn-primary" id="loginBtn" style="width:100%;margin-top:12px;padding:11px">Entrar</button>
    <div class="muted" style="font-size:10.5px;margin-top:12px">Conteúdo criptografado — sem o código não é legível.</div>
  </div>
</div>

<script>
/* ===== Camada restrita: senha simples do lado do cliente (NÃO é segurança forte) =====
   Troque o valor abaixo para mudar a senha dos dados restritos. */
const SENHA_RESTRITA = "rh2026";
/* PUBLICO=true gera a versão compartilhável: ignora o dados_rh.json externo e esconde tudo que for sensível (remuneração/sanções). */
const PUBLICO = true;
</script>

<script id="fallback-data" type="application/json">
null
</script>

<script>
/* ============ Carga de dados: tenta dados_rh.json, senão usa o embutido ============ */
let DADOS = null;
async function carregar(){
  if(!PUBLICO){
    try{
      const r = await fetch('dados_rh.json',{cache:'no-store'});
      if(r.ok){ DADOS = await r.json(); return 'arquivo'; }
    }catch(e){}
  }
  DADOS = JSON.parse(document.getElementById('fallback-data').textContent);
  return 'embutido';
}

/* ============ Utilitários ============ */
const MESES_PT=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MESES_LONGO=['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const HOJE = new Date();
let desbloqueado=false;
let temSensiveis=true;
let tela='visao';
let filtro={time:'Todos',cargo:'Todos',mes:'',pessoa:'Todos'};

const fmtBRL=v=>'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=v=>((v||0)*100).toFixed(1).replace('.',',')+'%';
const mesLabel=m=>{if(!m)return '—';const[a,mm]=m.split('-');return MESES_PT[+mm]+'/'+a.slice(2);};
const mesLongo=m=>{if(!m)return '—';const[a,mm]=m.split('-');return MESES_LONGO[+mm]+' de '+a;};
const fmtNasc=iso=>{if(!iso)return '';const[a,m,d]=iso.split('-');return a==='0000'?d+'/'+m:d+'/'+m+'/'+a;};
const nfEsperada=(c,mes)=>!!c&&c.tipo_vinculo==='PJ'&&(!c.nf_desde||mes>=c.nf_desde);
const fmtDate=dt=>String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
function proxReajuste(c){if(!c.data_base_reajuste)return null;const b=parseISO(c.data_base_reajuste);if(!b)return null;const p=new Date(b.getFullYear()+1,b.getMonth(),b.getDate());while(p<HOJE)p.setFullYear(p.getFullYear()+1);return p;}
const parseISO=s=>{if(!s)return null;const[a,m,d]=s.split('-').map(Number);return new Date(a,m-1,d);};
const parseBR=s=>{if(!s)return null;const p=s.trim().split('/');if(p.length!==3)return null;return new Date(+p[2],+p[1]-1,+p[0]);};
const diasEntre=(a,b)=>Math.round((b-a)/86400000);
function tempoDeCasa(iso){const d=parseISO(iso);if(!d)return null;const dias=diasEntre(d,HOJE);const anos=Math.floor(dias/365);const meses=Math.floor((dias%365)/30);return {dias,anos,meses};}
function tempoTexto(t){if(!t)return '—';if(t.anos>=1)return t.anos+(t.anos>1?' anos':' ano')+(t.meses?(' e '+t.meses+'m'):'');return t.meses+' meses';}
const timeClass=t=>t==='Comercial'?'com':t==='Operacional'?'ope':'adm';
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild;};

function colab(id){return DADOS.colaboradores.find(c=>c.id===id);}
function nomeCurto(id){const c=colab(id);if(!c)return id;const p=c.nome.split(' ');return p[0]+(p[1]?' '+p[1]:'');}
function iniciais(nome){const p=nome.split(' ').filter(Boolean);return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function corTime(c){return c.time_principal==='Comercial'?'var(--com)':c.time_principal==='Operacional'?'var(--ope)':'var(--adm)';}

/* pertence ao time (considera papel secundário: Julia = Operacional + Comercial) */
function noTime(c,t){return t==='Todos'||c.time_principal===t||c.papel_secundario===t;}
function passaFiltroPessoa(c){
  if(!noTime(c,filtro.time))return false;
  if(filtro.cargo!=='Todos'&&c.cargo!==filtro.cargo)return false;
  if(filtro.pessoa!=='Todos'&&c.id!==filtro.pessoa)return false;
  return true;
}
function mesesComDados(){
  const s=new Set();
  ['remuneracao','notas_fiscais','produtividade','kpi_closer'].forEach(k=>DADOS[k].forEach(r=>s.add(r.mes)));
  return [...s].sort();
}

/* ============ Máscara de dados sensíveis ============ */
function sens(valorHtml){return valorHtml;} /* senha removida — remuneração à mostra na versão da gestão */
function remunMes(cid,mes){return (DADOS.remuneracao||[]).find(r=>r.colaborador_id===cid&&r.mes===mes);}
function remunUlt(cid){const rs=(DADOS.remuneracao||[]).filter(r=>r.colaborador_id===cid).sort((a,b)=>a.mes.localeCompare(b.mes));return rs[rs.length-1];}
function remunFmt(r,modo){
  if(!r)return '<span class="muted">—</span>';
  if(modo==='comercial'){const cf=r.comercial_fixo||0,cc=r.comercial!=null?r.comercial:0;const p=[];if(cf)p.push('Fixo '+fmtBRL(cf));p.push('Comissão '+fmtBRL(cc));return sens(p.join(' · '));}
  if(modo==='operacional'){
    const fixa=r.fixa!=null?r.fixa:(r.salario_base||0), acor=r.acordos||0;
    const p=['Fixo '+fmtBRL(fixa)];if(acor)p.push('Acordos/sucumb. '+fmtBRL(acor));if(r.bonus)p.push('Bônus '+fmtBRL(r.bonus));
    return sens('<b>'+fmtBRL(fixa+acor+(r.bonus||0))+'</b> <span class="muted" style="font-size:11px">'+p.join(' · ')+'</span>');
  }
  const p=['Sal. '+fmtBRL(r.salario_base||0)];if(r.comissao)p.push('Com. '+fmtBRL(r.comissao));if(r.bonus)p.push('Bônus '+fmtBRL(r.bonus));
  return sens('<b>'+fmtBRL(r.total)+'</b> <span class="muted" style="font-size:11px">'+p.join(' · ')+'</span>');
}
function cardRemun(titulo,itens,mes){
  if(!(DADOS.remuneracao&&DADOS.remuneracao.length))return '';
  const linhas=itens.map(it=>{const c=colab(it.cid);return `<tr><td>${c?c.nome:it.cid}</td><td>${remunFmt(remunMes(it.cid,mes),it.modo)}</td></tr>`;}).join('');
  return `<div class="card" style="margin-bottom:16px"><h3>${titulo}</h3><div class="scroll"><table><thead><tr><th>Pessoa</th><th>Remuneração · ${mesLabel(mes)}</th></tr></thead><tbody>${linhas}</tbody></table></div><div class="muted" style="font-size:11px;margin-top:6px">Fonte: Financeiro RH · ${desbloqueado?'visível':'clique em “Dados restritos” para ver'}. Não vai para o link público.</div></div>`;
}

/* ============ Gráficos SVG (sem dependências) ============ */
function barrasH(itens,opt={}){ // itens: [{label,value,color,sub}]
  const max=opt.max||Math.max(1,...itens.map(i=>i.value));
  return '<div>'+itens.map(i=>{
    const w=Math.max(2,(i.value/max)*100);
    return `<div class="barrow"><div class="muted" title="${i.label}">${i.label}</div>
      <div class="bartrack"><div class="barfill" style="width:${w}%;background:${i.color||'var(--accent)'}"></div></div>
      <div class="num" style="text-align:right">${opt.fmt?opt.fmt(i.value):i.value}${i.sub?`<div class="muted" style="font-size:10px">${i.sub}</div>`:''}</div></div>`;
  }).join('')+'</div>';
}
function grupoBarras(series,cats,opt={}){ // series:[{name,color,data:[..]}], cats:[labels]
  const W=Math.max(360,cats.length*(series.length*14+26)+50),H=opt.h||210,pad=30,base=H-24,top=14;
  const max=opt.max||Math.max(1,...series.flatMap(s=>s.data));
  const gw=(W-pad-10)/cats.length, bw=Math.min(20,(gw-10)/series.length);
  let bars='';
  cats.forEach((c,ci)=>{
    const gx=pad+ci*gw;
    series.forEach((s,si)=>{
      const v=s.data[ci]||0;const h=(v/max)*(base-top);
      const x=gx+8+si*(bw+2);
      bars+=`<rect x="${x.toFixed(1)}" y="${(base-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="${s.color}"><title>${s.name} · ${c}: ${v}</title></rect>`;
      if(opt.vals&&v)bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${(base-h-3).toFixed(1)}" font-size="9" fill="var(--muted)" text-anchor="middle">${v}</text>`;
    });
    bars+=`<text x="${(gx+gw/2).toFixed(1)}" y="${H-8}" font-size="10" fill="var(--muted)" text-anchor="middle">${c}</text>`;
  });
  // grid lines
  let grid='';for(let g=0;g<=2;g++){const y=top+(base-top)*g/2;const val=Math.round(max*(1-g/2));grid+=`<line x1="${pad}" y1="${y}" x2="${W-6}" y2="${y}" stroke="var(--line)" stroke-dasharray="2 3"/><text x="4" y="${y+3}" font-size="9" fill="var(--muted2)">${val}</text>`;}
  const leg=series.map(s=>`<span style="display:inline-flex;align-items:center;gap:5px"><span class="dot" style="background:${s.color}"></span>${s.name}</span>`).join(' ');
  return `<div class="legend">${leg}</div><div class="scroll"><svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;min-width:${Math.min(W,520)}px">${grid}${bars}</svg></div>`;
}
function linhas(series,cats,opt={}){ // series:[{name,color,data}]
  const W=Math.max(420,cats.length*70+60),H=opt.h||210,padL=34,padR=12,base=H-24,top=12;
  const max=opt.max||Math.max(1,...series.flatMap(s=>s.data.filter(v=>v!=null)));
  const xw=(W-padL-padR)/Math.max(1,cats.length-1);
  const xy=(ci,v)=>[padL+ci*xw, base-(v/max)*(base-top)];
  let paths='';
  series.forEach(s=>{
    let d='';s.data.forEach((v,ci)=>{if(v==null)return;const[x,y]=xy(ci,v);d+=(d?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';});
    paths+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linejoin="round"/>`;
    s.data.forEach((v,ci)=>{if(v==null)return;const[x,y]=xy(ci,v);paths+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${s.color}"><title>${s.name} · ${cats[ci]}: ${v}</title></circle>`;});
  });
  let grid='';for(let g=0;g<=2;g++){const y=top+(base-top)*g/2;const val=Math.round(max*(1-g/2));grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-dasharray="2 3"/><text x="4" y="${y+3}" font-size="9" fill="var(--muted2)">${val}</text>`;}
  let xlab='';cats.forEach((c,ci)=>{const[x]=xy(ci,0);xlab+=`<text x="${x.toFixed(1)}" y="${H-8}" font-size="10" fill="var(--muted)" text-anchor="middle">${c}</text>`;});
  const leg=series.map(s=>`<span style="display:inline-flex;align-items:center;gap:5px"><span class="dot" style="background:${s.color}"></span>${s.name}</span>`).join(' ');
  return `<div class="legend">${leg}</div><div class="scroll"><svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;min-width:${Math.min(W,520)}px">${grid}${paths}${xlab}</svg></div>`;
}

function alertas(m){
  const out=[];
  // NF pendente do mês
  const nfMes=DADOS.notas_fiscais.filter(n=>n.mes===m&&!n.entregue).map(n=>colab(n.colaborador_id)).filter(c=>nfEsperada(c,m));
  if(nfMes.length)out.push({cls:'warn',ic:'🧾',titulo:`${nfMes.length} nota(s) fiscal(is) pendente(s)`,txt:nfMes.map(c=>nomeCurto(c.id)).join(', ')+' — não entregaram a NF de '+mesLabel(m)+'.'});
  // Em experiência (contrato ainda não firmado — o período de experiência não é registrado)
  DADOS.colaboradores.forEach(c=>{
    if(c.status==='experiencia')out.push({cls:'exp',titulo:`${nomeCurto(c.id)} em experiência`,txt:'Contrato ainda não firmado. Avaliar efetivação (o período de experiência não é registrado).'});
  });
  // Reajuste salarial anual (1 ano do contrato/aditivo) — avisa com 60 dias de antecedência
  DADOS.colaboradores.forEach(c=>{
    const p=proxReajuste(c);if(!p)return;const dd=diasEntre(HOJE,p);
    if(dd>=0&&dd<=60)out.push({cls:'warn',titulo:`Reajuste salarial de ${nomeCurto(c.id)} em ${dd} dia(s)`,txt:`Completa 1 ano do contrato/aditivo (base ${c.data_base_reajuste.split('-').reverse().join('/')}) — reajuste previsto para ${fmtDate(p)}.`});
  });
  // Contrato vencendo ≤90 dias (só se houver data-fim explícita)
  DADOS.colaboradores.forEach(c=>{
    const fim=(c.contrato_vigencia||'').match(/(\d{2}\/\d{2}\/\d{4})\s*$/);
    if(fim&&!/indetermin/i.test(c.contrato_vigencia)){const d=parseBR(fim[1]);if(d){const dd=diasEntre(HOJE,d);if(dd>=0&&dd<=90)out.push({cls:'warn',ic:'📄',titulo:`Contrato de ${nomeCurto(c.id)} vence em ${dd} dias`,txt:'Renovação recomendada.'});}}
  });
  // Férias a vencer: saldo>0 e período aquisitivo já encerrado
  DADOS.ferias.forEach(f=>{
    const c=colab(f.colaborador_id);if(!c)return;
    if(f.saldo>0){const aq=(f.periodo_aquisitivo||'').split(' - ')[1];const fim=parseBR(aq);
      if(fim&&fim<HOJE)out.push({cls:'warn',ic:'🏖️',titulo:`${nomeCurto(c.id)}: ${f.saldo} dias de férias a vencer`,txt:'Período aquisitivo encerrado em '+aq+' — programar concessão.'});}
    if(f.saldo<0)out.push({cls:'bad',ic:'🏖️',titulo:`${nomeCurto(c.id)}: saldo de férias negativo (${f.saldo})`,txt:'Dias gozados acima do direito adquirido (adiantamento) — conferir.'});
  });
  return out;
}

function telaFichas(){
  const lista=DADOS.colaboradores.filter(passaFiltroPessoa);
  if(!lista.length)return '<div class="muted">Nenhum colaborador com os filtros atuais.</div>';
  const _tR=DADOS.remuneracao&&DADOS.remuneracao.length>0,_tS=DADOS.sancoes&&DADOS.sancoes.length>0;
  const subInfo=(_tR||_tS)?`${_tS?'sanções':''}${_tS&&_tR?' e ':''}${_tR?'remuneração':''} à mostra (versão da gestão).`:'sem dados sensíveis nesta visão.';
  return `<h2 class="section">Fichas individuais</h2><div class="sub">${lista.length} colaborador(es) · ${subInfo}</div>
  <div class="grid g2">${lista.map(fichaCard).join('')}</div>`;
}
function fichaCard(c){
  const t=tempoDeCasa(c.data_admissao);
  const rem=DADOS.remuneracao.filter(r=>r.colaborador_id===c.id).sort((a,b)=>a.mes.localeCompare(b.mes));
  const ultRem=rem[rem.length-1];
  const nfMes=DADOS.notas_fiscais.filter(n=>n.colaborador_id===c.id);
  const nfPend=nfMes.filter(n=>!n.entregue&&nfEsperada(c,n.mes)).length;
  const fer=DADOS.ferias.find(f=>f.colaborador_id===c.id);
  const san=DADOS.sancoes.find(s=>s.colaborador_id===c.id);
  const temRemun=DADOS.remuneracao&&DADOS.remuneracao.length>0;
  const temSanc=DADOS.sancoes&&DADOS.sancoes.length>0;
  const remRow=(temRemun&&c.time_principal==='Administrativo')?`<div class="kv" style="grid-column:1/-1"><div class="k">Remuneração${ultRem?' · '+mesLabel(ultRem.mes):''}</div><div class="v">${remunFmt(ultRem,'total')}</div></div>`:'';
  const sanRow=temSanc?`<div class="kv"><div class="k">Sanções</div><div class="v">${san?`${san.faltas} falta(s)${san.ja_suspenso?' · <span class="cell-bad">já suspenso</span>':''}`:'sem registro'}</div></div>`:'';
  const stPill=c.status==='ativo'?'<span class="pill ok">ativo</span>':'<span class="pill exp">experiência</span>';
  return `<div class="fichacard">
    <div class="fichahead">
      <div class="avatar" style="background:${corTime(c)}">${iniciais(c.nome)}</div>
      <div><div style="font-weight:700;font-size:15px">${c.nome}</div>
      <div style="margin-top:3px"><span class="pill ${timeClass(c.time_principal)}">${c.time_principal}</span> ${c.papel_secundario?`<span class="pill ${timeClass(c.papel_secundario)}">+${c.papel_secundario}</span>`:''} ${stPill} ${(c.tags||[]).map(t=>`<span class="pill" style="background:rgba(8,145,178,.12);color:#0891b2">${t}</span>`).join('')}</div></div>
    </div>
    <div class="fichabody">
      <div class="kv"><div class="k">Cargo</div><div class="v">${c.cargo}</div></div>
      <div class="kv"><div class="k">Vínculo</div><div class="v">${c.tipo_vinculo||'—'}</div></div>
      ${c.oab?`<div class="kv"><div class="k">OAB</div><div class="v">${c.oab}</div></div>`:''}
      <div class="kv"><div class="k">Admissão</div><div class="v">${c.data_admissao?c.data_admissao.split('-').reverse().join('/'):'<span class="muted">pendente</span>'}</div></div>
      <div class="kv"><div class="k">Tempo de casa</div><div class="v">${t?tempoTexto(t):'—'}</div></div>
      <div class="kv"><div class="k">Situação</div><div class="v">${c.data_admissao?('Admitido(a)'+(c.fim_experiencia?' <span class="muted" style="font-size:11px">· exp. até '+c.fim_experiencia.split('-').reverse().join('/')+'</span>':'')):'Em experiência'}</div></div>
      <div class="kv"><div class="k">Próx. reajuste salarial</div><div class="v">${(()=>{const p=proxReajuste(c);return p?fmtDate(p):'<span class="muted">—</span>';})()}</div></div>
      <div class="kv"><div class="k">Nascimento</div><div class="v">${c.data_nascimento?fmtNasc(c.data_nascimento):'<span class="muted">cadastrar</span>'}</div></div>
      <div class="kv"><div class="k">Contrato</div><div class="v" style="font-size:12px">${c.contrato_vigencia||'—'}</div></div>
      <div class="kv"><div class="k">NF pendentes (2026)</div><div class="v">${nfPend?`<span class="cell-bad">${nfPend}</span>`:'<span class="cell-ok">0</span>'}</div></div>
      <div class="kv"><div class="k">Saldo de férias</div><div class="v">${fer?(fer.saldo+' dias'+(fer.banco_horas?` · ${fer.banco_horas}h banco`:'')):'—'}</div></div>
      ${remRow}${sanRow}
    </div>
    ${c.notas?`<div style="padding:0 16px 14px"><div class="muted" style="font-size:11.5px">ⓘ ${c.notas}</div></div>`:''}
  </div>`;
}

/* ---------- 3. NOTAS FISCAIS ---------- */
function telaNF(){
  const meses=[...new Set(DADOS.notas_fiscais.map(n=>n.mes))].sort();
  const pessoas=DADOS.colaboradores.filter(passaFiltroPessoa);
  let rows=pessoas.map(c=>{
    const cels=meses.map(m=>{
      const n=DADOS.notas_fiscais.find(x=>x.colaborador_id===c.id&&x.mes===m);
      if(c.tipo_vinculo!=='PJ')return '<td class="na" title="não emite NF">—</td>';
      if(c.nf_desde&&m<c.nf_desde)return '<td class="na" title="antes de começar a emitir NF">—</td>';
      if(!n)return '<td class="na">·</td>';
      return n.entregue?`<td class="yes" title="${n.arquivo||''}">✓</td>`:'<td class="no" title="pendente">✕</td>';
    }).join('');
    return `<tr><td>${c.nome}</td>${cels}</tr>`;
  }).join('');
  const totPend=DADOS.notas_fiscais.filter(n=>!n.entregue&&nfEsperada(colab(n.colaborador_id),n.mes)).length;
  return `<h2 class="section">Notas fiscais</h2>
  <div class="sub">Matriz de entrega colaborador × mês. Presença do arquivo no Drive = entregue.</div>
  <div class="legend"><span><span class="dot" style="background:var(--ok)"></span>entregue (✓)</span><span><span class="dot" style="background:var(--bad)"></span>pendente (✕)</span><span><span class="dot" style="background:var(--muted2)"></span>não se aplica (—)</span></div>
  <div class="card scroll"><table class="matrix"><thead><tr><th>Colaborador</th>${meses.map(m=>`<th class="num" style="text-align:center">${mesLabel(m)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
  <div class="muted" style="font-size:12px;margin-top:10px">Total de pendências (PJ, 2026): <b class="cell-bad">${totPend}</b>. Passe o mouse no ✓ para ver o nome do arquivo. Colaboradores sem vínculo PJ definido não emitem NF.</div>`;
}

      <div class="kv" style="margin-bottom:10px"><div class="k">Saldo negativo</div><div class="v">${lista.filter(c=>{const f=DADOS.ferias.find(x=>x.colaborador_id===c.id);return f&&f.saldo<0;}).map(c=>nomeCurto(c.id)).join(', ')||'nenhum'}</div></div>
      <div class="kv"><div class="k">Sem ficha</div><div class="v">${lista.filter(c=>{const f=DADOS.ferias.find(x=>x.colaborador_id===c.id);return !f||(!f.periodo_aquisitivo&&!f.saldo&&!f.banco_horas);}).map(c=>nomeCurto(c.id)).join(', ')||'nenhum'}</div></div>

/* ---------- 6. ANIVERSÁRIOS & TEMPO DE CASA ---------- */

  const semNasc=DADOS.colaboradores.filter(c=>!c.data_nascimento);
  // marcos de tempo de casa
  const marcos=DADOS.colaboradores.map(c=>{const t=tempoDeCasa(c.data_admissao);if(!t)return null;let marco=null;
    [5,2,1].forEach(a=>{if(!marco&&t.anos>=a&&t.anos<a+1)marco=a;});

  return `<h2 class="section">Aniversários & tempo de casa</h2>

    </div>
    <div class="card"><h3>Tempo de casa</h3>

    ${DADOS.colaboradores.filter(c=>!c.data_admissao).map(c=>`<tr><td>${c.nome}</td><td class="muted">admissão pendente</td><td class="muted">—</td><td class="muted">—</td></tr>`).join('')}

/* ---------- 7. COMERCIAL / CLOSERS ---------- */
let comercialModo='fechados';
function setComercial(m){comercialModo=m;render();}
function telaComercial(){
  const closers=DADOS.colaboradores.filter(c=>noTime(c,'Comercial')).filter(c=>DADOS.kpi_closer.some(k=>k.colaborador_id===c.id));
  const meses=[...new Set(DADOS.kpi_closer.map(k=>k.mes))].sort();
  const m=filtro.mes;
  // tabela do mês
  const linhasMes=closers.map(c=>DADOS.kpi_closer.find(k=>k.colaborador_id===c.id&&k.mes===m)).filter(Boolean);
  const pessoaSel=filtro.pessoa!=='Todos';
  const closersF=pessoaSel?closers.filter(c=>c.id===filtro.pessoa):closers;

  const pagosCrm=(cid,mes)=>{const r=(DADOS.pagos_crm||[]).find(x=>x.colaborador_id===cid&&x.mes===mes);return r||{qtd:0,valor:0};};
  const entradaCrm=(cid,mes)=>(DADOS.entrada_crm||[]).find(x=>x.colaborador_id===cid&&x.mes===mes)||null;
  const mesAnt=meses[meses.indexOf(m)-1];
  // séries por mês
  const cats=meses.map(mesLabel);
  const cores={felipe:'#d97706',lindsey:'#2563eb',pamela:'#db2777',julia_folkis:'#059669'};
  const campo=comercialModo; // fechados|pagos|atendimentos
  const series=closersF.map(c=>({name:nomeCurto(c.id),color:cores[c.id]||'var(--accent)',data:meses.map(mm=>{if(campo==='pagos')return pagosCrm(c.id,mm).qtd;const k=DADOS.kpi_closer.find(x=>x.colaborador_id===c.id&&x.mes===mm);return k?k[campo]:0;})}));
  // taxa conversão linha
  const serieTaxa=closersF.map(c=>({name:nomeCurto(c.id),color:cores[c.id]||'var(--accent)',data:meses.map(mm=>{const k=DADOS.kpi_closer.find(x=>x.colaborador_id===c.id&&x.mes===mm);return k?+(k.taxa_conversao*100).toFixed(1):null;})}));

  const totMes=linhasMes.reduce((s,k)=>({at:s.at+k.atendimentos,fe:s.fe+k.fechados}),{at:0,fe:0});
  const totPagos=closers.reduce((s,c)=>{const p=pagosCrm(c.id,m);return {qtd:s.qtd+p.qtd,valor:s.valor+p.valor};},{qtd:0,valor:0});
  const entMes=closers.map(c=>entradaCrm(c.id,m)).filter(Boolean);const temEntradaMes=entMes.length>0;const totEntrada=entMes.reduce((s,e)=>s+e.entrada,0);

  // ----- Metas por faixa (Bronze/Prata/Ouro/Master) -----
  const MC=(DADOS.metas_closer&&DADOS.metas_closer.por_closer)||{};
  const faixaCor={Bronze:'#b45309',Prata:'#64748b',Ouro:'#b7791f',Master:'#7c3aed'};
  const pillFaixa=n=>`<span class="pill" style="background:${faixaCor[n]}1f;color:${faixaCor[n]}">${n}</span>`;
  const faixaDe=(v,faixas)=>{let atual=null,prox=null;faixas.forEach(f=>{if(v>=f.min)atual=f;else if(!prox)prox=f;});return {atual,prox};};
  const valorContr=(cid,mes)=>{const r=(DADOS.valor_contratos||[]).find(x=>x.colaborador_id===cid&&x.mes===mes);return r?r.valor:null;};
  const mesInc=(DADOS.meta&&DADOS.meta.mes_incompleto)||null;
  const ultimos6=meses.filter(mm=>mm!==mesInc); // só meses FECHADOS — o mês corrente parcial (meta.mes_incompleto) só entra quando fechar
  const metasRows=closersF.map(c=>{
    const cfg=MC[c.id];const nome=nomeCurto(c.id);
    if(!cfg||!cfg.tipo){return `<tr><td>${nome}</td><td colspan="${ultimos6.length+1}" class="muted" style="font-size:12px">${(cfg&&cfg.obs)||'sem meta definida'}</td></tr>`;}
    const reais=cfg.tipo==='reais';
    const escBase=reais?`Bronze R$${cfg.faixas[0].min/1000}k`:`Bronze ${cfg.faixas[0].min}`;
    const cells=ultimos6.map(mm=>{
      const val=reais?valorContr(c.id,mm):pagosCrm(c.id,mm).qtd;
      if(val==null)return `<td style="text-align:center" class="muted">—</td>`;
      const {atual}=faixaDe(val,cfg.faixas);
      const disp=reais?('R$'+(val/1000).toFixed(1)+'k'):val;
      const cor=atual?faixaCor[atual.nome]:'var(--bad)';
      return `<td style="text-align:center;font-size:11.5px"><div style="font-weight:700">${disp}</div><div style="color:${cor};font-size:10px">${atual?atual.nome+' ✓':'abaixo ✗'}</div></td>`;
    }).join('');
    return `<tr><td>${nome}</td><td class="muted" style="font-size:11px">${escBase}</td>${cells}</tr>`;
  }).join('');
  const metaCard=`<div class="card" style="margin-bottom:16px"><h3>Metas por faixa — acumulado do ano (${ultimos6.length} meses)</h3>
    <div class="muted" style="font-size:11.5px;margin-bottom:10px">Por mês: contratos <b>pagos</b> (Felipe/Lindsey, CRM real) ou <b>valor R$</b> (Julia, controle) · a <b>faixa</b> atingida · <b>✓</b> = bateu a meta (Bronze+), <b>✗</b> = abaixo. <b>Pamela</b>: sem meta. Julia até jun (o controle dela não tem julho). O <b>mês em curso</b> só entra aqui quando fecha.</div>
    <div class="scroll"><table><thead><tr><th>Closer</th><th>Meta base</th>${ultimos6.map(mm=>`<th class="num">${mesLabel(mm)}</th>`).join('')}</tr></thead><tbody>${metasRows||`<tr><td colspan="${ultimos6.length+2}" class="muted">Sem closers no filtro.</td></tr>`}</tbody></table></div>
  </div>`;

  const tbl=closersF.map(c=>{
    const k=DADOS.kpi_closer.find(x=>x.colaborador_id===c.id&&x.mes===m);
    const p=pagosCrm(c.id,m), pAnt=mesAnt?pagosCrm(c.id,mesAnt):null;
    const delta=pAnt?p.qtd-pAnt.qtd:null;
    const dt=delta==null?'':delta>0?`<span style="color:var(--ok);font-size:11px"> ▲${delta}</span>`:delta<0?`<span style="color:var(--bad);font-size:11px"> ▼${Math.abs(delta)}</span>`:'<span class="muted" style="font-size:11px"> =</span>';
    if(!k&&!p.qtd)return '';
    return `<tr>
      <td>${c.nome}</td>
      <td class="num">${k?k.atendimentos:0}</td>
      <td class="num cell-ok">${k?k.fechados:0}</td>
      <td class="num">${k?fmtPct(k.taxa_conversao):'—'}</td>
      <td class="num" style="font-weight:700;color:var(--accent)">${p.qtd}${dt}</td>
      <td class="num">${(()=>{const e=entradaCrm(c.id,m);return e?fmtBRL(e.entrada):'<span class="muted">—</span>';})()}</td>
    </tr>`;}).filter(Boolean).join('')||`<tr><td colspan="6" class="muted">Sem dados em ${mesLabel(m)}.</td></tr>`;

  return `<h2 class="section">Comercial / Closers</h2>
  <div class="sub">Avaliação de desempenho dos closers. <b>Atendimentos</b> e <b>assinados</b> vêm do KPI, pela <b>data da reunião</b> — ⚠️ relativizado (não é a data real da assinatura). <b>Pagos</b> vêm do CRM, pela <b>data real de pagamento</b>. Conversão = assinados ÷ atendimentos qualificados (exclui No Show e Desqualificado). Agregado por closer (LGPD).</div>
  <div class="banner">⚠️ Julho/2026 é <b>parcial</b> (foto do início do mês). Para o mês corrente valer por inteiro, os dados precisam ser reprocessados — KPI e CRM são alimentados ao longo do mês.</div>
  <div class="grid g4" style="margin-bottom:16px">
    <div class="card"><h3>Atendimentos ${mesLabel(m)}</h3><div class="kpi">${totMes.at}</div><div class="muted" style="font-size:10px;margin-top:4px">data da reunião</div></div>
    <div class="card"><h3>Assinados ${mesLabel(m)}</h3><div class="kpi" style="color:var(--ok)">${totMes.fe}</div><div class="muted" style="font-size:10px;margin-top:4px">KPI · relativizado</div></div>
    <div class="card"><h3>Pagos ${mesLabel(m)}</h3><div class="kpi" style="color:var(--accent)">${totPagos.qtd}</div><div class="muted" style="font-size:10px;margin-top:4px">pagamento real (CRM)</div></div>
    <div class="card"><h3>Entrada paga ${mesLabel(m)}</h3><div class="kpi">${temEntradaMes?fmtBRL(totEntrada):'—'}</div><div class="muted" style="font-size:10px;margin-top:4px">${temEntradaMes?'valor da entrada (CRM, data pagto)':'sem dados neste mês'}</div></div>
  </div>
  ${metaCard}
  <div class="card" style="margin-bottom:16px"><h3>Detalhe por closer — ${mesLongo(m)}</h3>
    <div class="scroll"><table><thead><tr><th>Closer</th><th class="num">Atend.</th><th class="num">Assinados</th><th class="num">Conversão</th><th class="num">Pagos (real)</th><th class="num">Entrada paga</th></tr></thead><tbody>${tbl}</tbody></table></div>
    <div class="muted" style="font-size:11px;margin-top:6px">▲/▼ = pagos vs ${mesAnt?mesLabel(mesAnt):'mês anterior'}. Atend./Assinados: data da reunião (relativizado). Pagos: qtd por data real de pagamento (CRM mestre). Entrada paga: valor da entrada por data de pagamento (CRM 2026-CLAUDE, inclui julho).</div>

  </h3>
    ${grupoBarras(series,cats,{vals:true,h:230})}

}

/* ---------- 8. PRODUTIVIDADE OPERACIONAL ---------- */
let prodModo='total';
function setProd(m){prodModo=m;render();}
function telaProdutividade(){
  const ops=DADOS.colaboradores.filter(c=>noTime(c,'Operacional')).filter(c=>DADOS.produtividade.some(p=>p.colaborador_id===c.id));
  const meses=[...new Set(DADOS.produtividade.map(p=>p.mes))].sort();
  const m=meses.includes(filtro.mes)?filtro.mes:meses[meses.length-1];
  const pessoaSel=filtro.pessoa!=='Todos';
  const opsF=pessoaSel?ops.filter(c=>c.id===filtro.pessoa):ops;
  const cats=meses.map(mesLabel);
  const cores={julia_folkis:'#059669',bruna_santana:'#2563eb',bruna_cardoso:'#7c3aed',pedro_sandrin:'#d97706',rhaissa:'#db2777',karla:'#0891b2'};
  const campo=prodModo; // total|prazos|tarefas|audiencias
  const series=opsF.map(c=>({name:nomeCurto(c.id),color:cores[c.id]||'var(--accent)',data:meses.map(mm=>{const p=DADOS.produtividade.find(x=>x.colaborador_id===c.id&&x.mes===mm);return p?p[campo]:0;})}));

  const linhasMes=opsF.map(c=>DADOS.produtividade.find(p=>p.colaborador_id===c.id&&p.mes===m)).filter(Boolean);
  const tot=linhasMes.reduce((s,p)=>({pr:s.pr+p.prazos,ta:s.ta+p.tarefas,au:s.au+p.audiencias,to:s.to+p.total,pe:s.pe+p.pendentes,ca:s.ca+p.cancelados}),{pr:0,ta:0,au:0,to:0,pe:0,ca:0});
  const tbl=linhasMes.map(p=>{const c=colab(p.colaborador_id);return `<tr>
      <td>${c.nome}</td>
      <td class="num">${p.prazos}</td><td class="num">${p.tarefas}</td><td class="num">${p.audiencias}</td>
      <td class="num cell-ok">${p.total}</td><td class="num">${p.pendentes}</td><td class="num ${p.cancelados>15?'cell-bad':''}">${p.cancelados}</td>
    </tr>`;}).join('')||`<tr><td colspan="7" class="muted">Sem dados em ${mesLabel(m)}.</td></tr>`;

  return `<h2 class="section">Produtividade operacional</h2>
  <div class="sub">Prazos, tarefas e audiências por advogado(a). Fonte: Produtividade Astrea — dados de Maio e Junho/2026.</div>
  <div class="grid g4" style="margin-bottom:16px">
    <div class="card"><h3>Total cumprido ${mesLabel(m)}</h3><div class="kpi" style="color:var(--ok)">${tot.to}</div></div>
    <div class="card"><h3>Prazos ${mesLabel(m)}</h3><div class="kpi">${tot.pr}</div></div>
    <div class="card"><h3>Audiências ${mesLabel(m)}</h3><div class="kpi">${tot.au}</div></div>
    <div class="card"><h3>Pendentes / cancelados</h3><div class="kpi">${tot.pe}<small> / ${tot.ca}</small></div></div>
  </div>
  <div class="card" style="margin-bottom:16px"><h3>Detalhe de ${mesLongo(m)}</h3>
    <div class="scroll"><table><thead><tr><th>Advogado(a)</th><th class="num">Prazos</th><th class="num">Tarefas</th><th class="num">Audiências</th><th class="num">Total</th><th class="num">Pendentes</th><th class="num">Cancelados</th></tr></thead><tbody>${tbl}</tbody></table></div>
  </div>
  ${cardRemun('Remuneração operacional — '+mesLongo(m), ops.map(c=>({cid:c.id,modo:'operacional'})), m)}
  <div class="card" style="margin-bottom:16px"><h3 style="display:flex;align-items:center;gap:8px">Comparativo / evolução
    <span style="margin-left:auto"></span>
    ${['total','prazos','tarefas','audiencias'].map(x=>`<button class="switchbtn ${prodModo===x?'active':''}" data-switch="${x}" data-fn="setProd">${x[0].toUpperCase()+x.slice(1)}</button>`).join('')}
  </h3>
    ${grupoBarras(series,cats,{vals:true,h:230})}
  </div>
  <div class="card"><h3>Evolução do total cumprido</h3>
    ${linhas(opsF.map(c=>({name:nomeCurto(c.id),color:cores[c.id]||'var(--accent)',data:meses.map(mm=>{const p=DADOS.produtividade.find(x=>x.colaborador_id===c.id&&x.mes===mm);return p?p.total:null;})})),cats,{h:200})}
  </div>`;
}

/* ---------- 9. AVALIAÇÕES (operacional) ---------- */
let avalCiclo=null;
function setAval(id){avalCiclo=id;render();}
function telaAvaliacoes(){
  const A=DADOS.avaliacoes;
  if(!A||!A.ciclos||!A.ciclos.length)return '<h2 class="section">Avaliações</h2><div class="muted">Sem dados de avaliação nesta versão.</div>';
  const ciclos=A.ciclos, Q=A.quesitos;
  if(!avalCiclo||!ciclos.some(c=>c.id===avalCiclo))avalCiclo=ciclos[ciclos.length-1].id;
  const cy=ciclos.find(c=>c.id===avalCiclo);
  const idx=ciclos.findIndex(c=>c.id===avalCiclo);
  const prev=idx>0?ciclos[idx-1]:null;
  const corG=g=>g>=2.9?'#059669':g>=2.7?'#2563eb':g>=2.5?'#d97706':'#dc2626';
  const geralPrev=(cid,nome)=>{if(!prev)return null;const pp=prev.pessoas.find(x=>(cid&&x.colaborador_id===cid)||x.nome===nome);return pp?pp.geral:null;};
  const pessoaSel=filtro.pessoa!=='Todos';
  const pessoas=pessoaSel?cy.pessoas.filter(p=>p.colaborador_id===filtro.pessoa):cy.pessoas;
  const ranking=cy.pessoas.slice().sort((a,b)=>b.geral-a.geral);
  const rankHtml=barrasH(ranking.map(p=>({label:p.nome.split(' ').slice(0,2).join(' '),value:p.geral,color:corG(p.geral)})),{max:3,fmt:v=>v.toFixed(2)});
  const cards=pessoas.map(p=>{
    const bars=Q.map((q,i)=>{const v=p.notas[i];return `<div class="barrow" style="grid-template-columns:112px 1fr 34px;margin:5px 0"><div class="muted">${q}</div><div class="bartrack" style="height:12px"><div class="barfill" style="width:${(v/3)*100}%;background:${corG(v)}"></div></div><div class="num" style="font-size:12px">${v.toFixed(2)}</div></div>`;}).join('');
    const gp=geralPrev(p.colaborador_id,p.nome);const delta=gp!=null?+(p.geral-gp).toFixed(2):null;
    const dtag=delta==null?'':delta>0?`<span style="color:var(--ok);font-size:11.5px">▲ +${delta.toFixed(2)}</span>`:delta<0?`<span style="color:var(--bad);font-size:11.5px">▼ ${delta.toFixed(2)}</span>`:`<span class="muted" style="font-size:11.5px">=</span>`;
    const lista=(t,arr,cor)=>arr&&arr.length?`<div style="margin-top:9px"><div style="font-size:10.5px;font-weight:700;color:${cor};text-transform:uppercase;letter-spacing:.4px">${t}</div><ul style="margin:4px 0 0;padding-left:17px">${arr.map(x=>`<li style="font-size:12.5px;margin:3px 0;line-height:1.45">${x}</li>`).join('')}</ul></div>`:'';
    return `<div class="card">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:4px">
        <div class="avatar" style="background:${corG(p.geral)}">${iniciais(p.nome)}</div>
        <div style="flex:1"><div style="font-weight:700">${p.nome}</div>${p.colaborador_id?'':'<span class="pill" style="background:var(--panel2);color:var(--muted)">ex-colaboradora</span>'}</div>
        <div style="text-align:right"><div style="font-size:26px;font-weight:700;letter-spacing:-1px;color:${corG(p.geral)}">${p.geral.toFixed(2)}<small style="color:var(--muted2);font-size:12px">/3</small></div>${dtag?dtag+' <span class="muted" style="font-size:10.5px">vs '+prev.label.split(' ')[0]+'</span>':''}</div>
      </div>
      ${p.obs?`<div class="muted" style="font-size:11.5px;margin:2px 0 4px">ⓘ ${p.obs}</div>`:''}
      <div style="margin:8px 0 2px">${bars}</div>
      ${lista('Pontos fortes',p.fortes,'#059669')}
      ${lista('Destaques do trimestre',p.destaques,'var(--accent)')}
      ${lista('Pontos de atenção',p.atencao,'#d97706')}
    </div>`;
  }).join('');
  return `<h2 class="section">Avaliações de desempenho — Operacional</h2>
  <div class="sub">${A.metodologia}</div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    ${ciclos.map(c=>`<button class="switchbtn ${c.id===avalCiclo?'active':''}" data-switch="${c.id}" data-fn="setAval">${c.label}</button>`).join('')}
    <span class="muted" style="font-size:12px;margin-left:6px">${cy.respostas} respostas · escala 0–3 · ${prev?'comparando com '+prev.label:'primeiro ciclo'}</span>
  </div>
  <div class="card" style="margin-bottom:16px;background:var(--accent-soft);border-color:rgba(99,102,241,.22)"><h3 style="color:#4f46e5">Leitura rápida — ${cy.label}</h3><div style="font-size:13px;color:#3730a3;line-height:1.55">${cy.leitura}</div></div>
  <div class="grid g2" style="margin-bottom:16px">
    <div class="card"><h3>Ranking do time (média geral /3)</h3>${rankHtml}</div>
    <div class="card"><h3>Escala &amp; quesitos</h3><div class="muted" style="font-size:12.5px;line-height:1.8">${A.escala.split(' · ').map(x=>`<div>${x}</div>`).join('')}</div><div style="font-size:11.5px;margin-top:8px;color:var(--muted)">Quesitos: <b>${Q.join(' · ')}</b>.</div></div>
  </div>
  <div class="grid g2">${cards||'<div class="muted">Nenhuma pessoa no filtro.</div>'}</div>`;
}

/* ============ Password / restrito ============ */
function abrirModal(){document.getElementById('overlay').style.display='flex';document.getElementById('pwd').value='';document.getElementById('pwdErr').textContent='';document.getElementById('pwd').focus();}
function fecharModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('lockBtn').onclick=()=>{if(desbloqueado){desbloqueado=false;render();}else abrirModal();};
document.getElementById('cancelPwd').onclick=fecharModal;
document.getElementById('okPwd').onclick=()=>{
  if(document.getElementById('pwd').value===SENHA_RESTRITA){desbloqueado=true;fecharModal();render();}
  else document.getElementById('pwdErr').textContent='Senha incorreta.';
};
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('okPwd').click();});

/* ============ Boot ============ */
function iniciar(origem){
  const temR=DADOS.remuneracao&&DADOS.remuneracao.length>0, temS=DADOS.sancoes&&DADOS.sancoes.length>0;
  temSensiveis=!!(temR||temS);
  document.querySelector('.lockbar').style.display='none';
  const rodape=PUBLICO
    ? `Acesso por código · TODO o conteúdo criptografado (AES-256), inclui remuneração. Só compartilhe o código com quem pode ver salários. Documentos-fonte no Google Drive.`
    : `Versão da gestão · contém remuneração e dados sensíveis, à mostra (sem senha) — NÃO publique nem compartilhe este arquivo. Documentos-fonte no Google Drive.`;
  document.getElementById('foot').innerHTML=`Fonte: <b>${origem==='cifrado'?'dados criptografados':origem==='arquivo'?'dados_rh.json':'cópia embutida no HTML'}</b> · gerado em ${DADOS.meta.gerado_em} · ${DADOS.meta.escritorio}. `+rodape;
  pintarFiltros();
  render();
}
async function decifrar(code, enc){
  const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(code),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(enc.salt),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(enc.iv)},key,b(enc.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
function mostrarLogin(enc){
  const scr=document.getElementById('loginScreen');scr.style.display='flex';
  const inp=document.getElementById('loginCode'),err=document.getElementById('loginErr'),btn=document.getElementById('loginBtn');
  setTimeout(()=>inp.focus(),50);
  if(!(window.crypto&&crypto.subtle)){err.textContent='Abra pelo link (https) — a criptografia não funciona em arquivo local.';return;}
  const tentar=async()=>{
    const code=inp.value.trim();if(!code){return;}
    err.textContent='';btn.disabled=true;btn.textContent='Verificando…';
    try{DADOS=await decifrar(code,enc);scr.style.display='none';iniciar('cifrado');}
    catch(e){err.textContent='Código incorreto.';btn.disabled=false;btn.textContent='Entrar';inp.value='';inp.focus();}
  };
  btn.onclick=tentar;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')tentar();});
}
async function boot(){
  let enc=null;try{enc=JSON.parse(document.getElementById('enc-data').textContent);}catch(e){}
  if(PUBLICO&&enc){mostrarLogin(enc);return;}
  const origem=await carregar();iniciar(origem);
}
boot();
</script>
